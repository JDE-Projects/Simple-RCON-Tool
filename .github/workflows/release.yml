name: Release
run-name: Release ${{ github.ref_name }}   # else the run is titled by the tagged commit's message
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@50c6357e33a5c715e4f55df9e366c9600cca0943 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleRCONTool
      dist_subfolder: "Simple RCON Tool"
      python_version: "3.14"
      build_command: "Build_Simple_RCON_Tool.bat"
      app_id: "bd83904f-6fac-414c-970a-7a9b2d5fb66e" # stable per-app installer GUID; generated once, never reuse or change
      entry_script: "simple_rcon_tool.py"
