name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@a2cb83a9459b6c357fc4f7778e8d1e99844fc8f9 # Build-Tools main (checkout v7)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleRCONTool
      dist_subfolder: "Simple RCON Tool"
      python_version: "3.14"
      build_command: "Build_Simple_RCON_Tool.bat"
      app_id: "bd83904f-6fac-414c-970a-7a9b2d5fb66e" # stable per-app installer GUID; generated once, never reuse or change
