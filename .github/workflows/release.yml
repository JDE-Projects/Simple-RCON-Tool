name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@5a58e725df3d7665c70ddb6164da9297b8fae72a # Build-Tools: installer + empty-folder-on-uninstall fix
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleRCONTool
      dist_subfolder: "Simple RCON Tool"
      python_version: "3.14"
      build_command: "Build_Simple_RCON_Tool.bat"
      app_id: "bd83904f-6fac-414c-970a-7a9b2d5fb66e" # stable per-app installer GUID; generated once, never reuse or change
